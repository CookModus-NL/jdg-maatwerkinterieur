<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="JDG Maatwerk Interieur">
  <defs>
    <style>
      .name { font: 700 26px/1 'Fraunces Variable', Georgia, serif; fill: #1F3D2D; letter-spacing: 0.02em; }
      .sub  { font: 500 10px/1 'Inter Variable', system-ui, sans-serif; fill: #B8915E; letter-spacing: 0.32em; text-transform: uppercase; }
    </style>
  </defs>
  <!-- Icoon: drie houten lamellen in oplopende hoogte (JDG) -->
