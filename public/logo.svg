    <rect x="0"  y="14" width="12" height="38" rx="3" fill="#1F3D2D"/>
    <rect x="16" y="0"  width="12" height="52" rx="3" fill="#B8915E"/>
    <rect x="32" y="24" width="12" height="28" rx="3" fill="#1F3D2D"/>
  </g>
  <!-- Woordmerk -->
  <text class="name" x="74" y="38">JDG</text>
  <text class="sub"  x="74" y="58">MAATWERK INTERIEUR</text>
